<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Splash Screen - 现场说说</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b8cee",
                        "background-light": "#ffffff",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body {
            min-height: 100dvh;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased h-full w-full flex flex-col justify-between selection:bg-primary selection:text-white">
    <div class="flex-1"></div>
    <main class="flex-[2] flex flex-col items-center justify-start px-6">
        <div class="mb-8 flex items-center justify-center">
            <div class="relative">
                <span class="material-symbols-outlined text-primary text-7xl font-light">location_on</span>
                <div class="absolute -top-1 -right-1 w-3 h-3 rounded-full bg-primary/20"></div>
            </div>
        </div>
        <h1 class="text-slate-900 dark:text-white tracking-tight text-4xl font-bold mb-3">
            现场说说
        </h1>
        <p class="text-slate-400 dark:text-slate-500 text-base font-normal tracking-wide text-center">
            走到哪，看哪的现场信息
        </p>
    </main>
    <footer class="flex-1 flex flex-col justify-end items-center pb-12">
        <div
            class="flex items-center justify-center text-slate-400/60 dark:text-slate-600 text-[11px] tracking-[0.2em] font-light">
            <span>个人开发 · 纯便民工具</span>
        </div>
    </footer>

</body>

</html>
