<!DOCTYPE html>

<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Permission Request Screen</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b8cee",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased selection:bg-primary/20">
    <div
        class="relative flex h-full min-h-screen w-full flex-col justify-between overflow-x-hidden bg-white dark:bg-slate-900 max-w-md mx-auto shadow-2xl">
        <!-- Top Section: Icon & Headers -->
        <div class="flex flex-col items-center pt-24 pb-8 px-6 text-center flex-grow justify-center">
            <!-- Icon Illustration -->
            <div class="mb-8 p-6 rounded-full bg-primary/10 text-primary">
                <span class="material-symbols-outlined !text-6xl">location_on</span>
            </div>
            <h1 class="text-slate-900 dark:text-white tracking-tight text-2xl font-bold leading-tight pb-3">
                请开启必要权限
            </h1>
            <p class="text-slate-500 dark:text-slate-400 text-base font-normal leading-relaxed max-w-[280px]">
                需要获取您的实时位置，<br />才能查看/进入现场信息
            </p>
        </div>
        <!-- Middle Section: Actions -->
        <div class="w-full px-6 flex flex-col gap-3 mb-8">
            <button
                class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-12 px-5 bg-primary hover:bg-primary/90 transition-colors text-white text-[15px] font-bold leading-normal tracking-wide shadow-sm active:scale-[0.98] transform duration-100">
                <span class="truncate">开启位置权限</span>
            </button>
            <button
                class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-12 px-5 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors text-slate-600 dark:text-slate-300 text-[15px] font-medium leading-normal tracking-wide active:scale-[0.98] transform duration-100">
                <span class="truncate">仅浏览（无位置，无法查看信息）</span>
            </button>
        </div>
        <!-- Bottom Section: Login Prompt -->
        <div class="px-6 pb-10">
            <div
                class="flex flex-col gap-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 p-5">
                <div class="flex flex-row items-center justify-between">
                    <div class="flex flex-col gap-1">
                        <p class="text-slate-900 dark:text-white text-sm font-bold leading-tight">
                            更完整的体验
                        </p>
                        <p class="text-slate-500 dark:text-slate-400 text-xs font-normal leading-normal">
                            登录以发布信息和管理内容
                        </p>
                    </div>
                    <div class="h-8 w-8 flex items-center justify-center rounded-full bg-primary/10 text-primary">
                        <span class="material-symbols-outlined !text-[20px]">person</span>
                    </div>
                </div>
                <div class="flex items-center gap-4 pt-2 border-t border-slate-200 dark:border-slate-700/50 mt-1">
                    <a class="flex-1 text-center py-2 text-sm font-bold text-primary hover:text-primary/80 transition-colors cursor-pointer"
                        href="#">
                        立即登录
                    </a>
                    <div class="w-px h-4 bg-slate-300 dark:bg-slate-600"></div>
                    <button
                        class="flex-1 text-center py-2 text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-colors cursor-pointer">
                        稍后登录
                    </button>
                </div>
            </div>
            <div class="mt-8 text-center">
                <p class="text-[10px] text-slate-400 dark:text-slate-500">
                    我们会严格保护您的隐私安全
                </p>
            </div>
        </div>
    </div>
</body>

</html>
